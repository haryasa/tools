<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- The <title> becomes the tool's name in the index. -->
  <title>Tool Name</title>
  <!-- This description is shown under the name in the index. Keep it to one line. -->
  <meta name="description" content="One sentence describing what this tool does.">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem 4rem;
      line-height: 1.5; color: #1a1a1a; background: #fafafa;
    }
    h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
    .sub { color: #666; margin: 0 0 1.5rem; font-size: .92rem; }
    label { display: block; font-weight: 600; margin: 1rem 0 .35rem; }
    textarea, input[type=text] {
      width: 100%; font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: .92rem; padding: .7rem .8rem; border: 1px solid #ccc;
      border-radius: 8px; background: #fff; color: inherit; resize: vertical;
    }
    textarea { min-height: 140px; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; margin: 1rem 0; }
    button {
      font: inherit; padding: .55rem 1.1rem; border: 1px solid #ccc;
      border-radius: 8px; background: #fff; color: inherit; cursor: pointer;
    }
    button:hover { border-color: #999; }
    button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    a.back { color: #888; font-size: .85rem; text-decoration: none; }
    @media (prefers-color-scheme: dark) {
      body { color: #e6e6e6; background: #111; }
      .sub { color: #aaa; }
      textarea, input[type=text], button { background: #1c1c1c; border-color: #333; }
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">&larr; Tools</a>
  <h1>Tool Name</h1>
  <p class="sub">One sentence describing what this tool does.</p>

  <!-- Build your tool below. Keep everything in this one file so it stays
       grabbable: no build step, no framework. Prefer dependency-free (works
       offline); a CDN <script src> is OK only when a tool truly needs a
       library. -->

  <script>
    // Your logic here.
  </script>
</body>
</html>
