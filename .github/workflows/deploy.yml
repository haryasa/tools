name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so colophon dates are accurate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build index and colophon
        run: python build.py
      - uses: actions/configure-pages@v5
      - name: Stage site files
        run: |
          mkdir _site
          # Copy every tool plus the generated pages; skip repo plumbing.
          cp *.html _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
