name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so colophon dates are accurate
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build index, colophon, and staged _site/
        run: python build.py
        env:
          # Set GA_MEASUREMENT_ID under Settings → Secrets and variables →
          # Actions → Variables. Empty/unset = no analytics tag injected.
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
          # Footer "view source" link; derived from the repo automatically.
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
