<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UUID Generator</title>
  <meta name="description" content="Generate one or many random v4 UUIDs using the browser's crypto API.">
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 640px; margin: 0 auto; padding: 2rem 1.25rem 4rem;
      line-height: 1.5; color: #1a1a1a; background: #fafafa;
    }
    h1 { font-size: 1.5rem; margin: 0 0 .25rem; }
    .sub { color: #666; margin: 0 0 1.5rem; font-size: .92rem; }
    .row { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin: 1rem 0; }
    button {
      font: inherit; padding: .55rem 1.1rem; border: 1px solid #ccc;
      border-radius: 8px; background: #fff; color: inherit; cursor: pointer;
    }
    button:hover { border-color: #999; }
    button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    label { font-size: .88rem; color: #666; }
    input[type=number] { font: inherit; width: 5rem; padding: .4rem .5rem; border: 1px solid #ccc; border-radius: 6px; background: #fff; color: inherit; }
    label.opt { display: inline-flex; gap: .35rem; align-items: center; }
    textarea {
      width: 100%; min-height: 200px; font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: .92rem; padding: .8rem; border: 1px solid #ccc; border-radius: 8px;
      background: #fff; color: inherit; resize: vertical;
    }
    .status { font-size: .88rem; color: #15803d; min-height: 1.4em; margin-top: .5rem; }
    a.back { color: #888; font-size: .85rem; text-decoration: none; }
    @media (prefers-color-scheme: dark) {
      body { color: #e6e6e6; background: #111; }
      .sub, label { color: #aaa; }
      textarea, button, input[type=number] { background: #1c1c1c; border-color: #333; }
    }
  </style>
</head>
<body>
  <a class="back" href="../index.html">&larr; Tools</a>
  <h1>UUID Generator</h1>
  <p class="sub">Cryptographically random version 4 UUIDs, generated locally with <code>crypto.randomUUID()</code>.</p>

  <div class="row">
    <label>Count <input type="number" id="count" value="1" min="1" max="1000"></label>
    <label class="opt"><input type="checkbox" id="upper"> Uppercase</label>
    <label class="opt"><input type="checkbox" id="braces"> Braces</label>
    <button class="primary" id="generate">Generate</button>
    <button id="copy">Copy</button>
  </div>

  <textarea id="output" spellcheck="false" readonly></textarea>
  <div class="status" id="status"></div>

  <script>
    const out = document.getElementById('output');
    const status = document.getElementById('status');

    function uuid() {
      // crypto.randomUUID is available in all modern browsers; fall back just in case.
      if (crypto.randomUUID) return crypto.randomUUID();
      const b = crypto.getRandomValues(new Uint8Array(16));
      b[6] = (b[6] & 0x0f) | 0x40;
      b[8] = (b[8] & 0x3f) | 0x80;
      const h = [...b].map(x => x.toString(16).padStart(2, '0'));
      return `${h[0]}${h[1]}${h[2]}${h[3]}-${h[4]}${h[5]}-${h[6]}${h[7]}-${h[8]}${h[9]}-${h[10]}${h[11]}${h[12]}${h[13]}${h[14]}${h[15]}`;
    }

    function generate() {
      const n = Math.min(1000, Math.max(1, parseInt(document.getElementById('count').value, 10) || 1));
      const upper = document.getElementById('upper').checked;
      const braces = document.getElementById('braces').checked;
      const list = Array.from({ length: n }, () => {
        let u = uuid();
        if (upper) u = u.toUpperCase();
        if (braces) u = `{${u}}`;
        return u;
      });
      out.value = list.join('\n');
      status.textContent = `Generated ${n} UUID${n === 1 ? '' : 's'}`;
    }

    document.getElementById('generate').onclick = generate;
    document.getElementById('copy').onclick = async () => {
      if (!out.value) return;
      try {
        await navigator.clipboard.writeText(out.value);
        status.textContent = 'Copied to clipboard ✓';
      } catch {
        status.textContent = 'Could not access clipboard';
      }
    };

    generate();
  </script>
</body>
</html>
